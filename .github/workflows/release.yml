name: Build, Sign & Deploy

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Playstore
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump version
        id: version
        run: |
          # Read current version
          CODE=$(grep VERSION_CODE version.properties | cut -d= -f2)
          NAME=$(grep VERSION_NAME version.properties | cut -d= -f2)

          # Bump version code
          NEW_CODE=$((CODE + 1))

          # Bump patch version (1.0.0 -> 1.0.1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"

          # Write back
          echo "VERSION_CODE=${NEW_CODE}" > version.properties
          echo "VERSION_NAME=${NEW_NAME}" >> version.properties

          echo "version_code=${NEW_CODE}" >> $GITHUB_OUTPUT
          echo "version_name=${NEW_NAME}" >> $GITHUB_OUTPUT

          echo "📦 Version: ${NEW_NAME} (${NEW_CODE})"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/calcmate-release.keystore

      - name: Build release AAB
        env:
          KEYSTORE_FILE: calcmate-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build release APK
        env:
          KEYSTORE_FILE: calcmate-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: v${{ steps.version.outputs.version_name }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.perfectappstudio.scientificcalc
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
